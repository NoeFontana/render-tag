dataset:
  output_dir: output/apriltag_checkerboard
  seed: 42
  num_scenes: 1

camera:
  resolution: [1280, 720]
  samples_per_scene: 5
  fov: 60

tag:
  size_meters: 0.08
  texture_path: assets/tags/tag36h11

scenario:
  layout: cb
  tag_families: [tag36h11]
  tags_per_scene: [6, 6]  # Fixed number for consistent grid
  grid_size: [3, 2]
  corner_size: 0.02

scene:
  lighting:
    intensity_min: 100
    intensity_max: 800

physics:
  drop_height: 0.05
