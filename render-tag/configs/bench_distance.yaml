# Benchmarking Configuration for Distance
# Generates 3 scenes (Plain, Checkerboard, AprilGrid)
# Each scene has 10 distances (2m - 20m)
# All images are perfectly aligned (top-down, azimuth 0)

dataset:
  num_scenes: 3

scene:
  physics:
    drop_height: 0.0

camera:
  resolution: [1280, 720]
  fov: 60.0
  samples_per_scene: 10
  elevation: 1.0 
  azimuth: 0.0
  min_distance: 2.0
  max_distance: 20.0

tag:
  family: tag36h11
  size_meters: 0.16

scenario:
  layouts: ["plain", "cb", "aprilgrid"]
  tags_per_scene: [36, 36]
  grid_size: [6, 6]
  
  # tag_spacing: gap between tags (white space) in meters
  # - Plain: gap between tag edges
  # - CB/AprilGrid: equals square_size (cell size)
  tag_spacing: 0.09  # 9cm gap between 16cm tags
  marker_margin: 0.02
  corner_size: 0.02
  
  sampling_mode: distance
