dataset:
  output_dir: output/aruco_charuco
  num_scenes: 1

camera:
  resolution: [1280, 1280]
  samples_per_scene: 5
  min_distance: 1.0
  max_distance: 2.0
  min_elevation: 0.7
  max_elevation: 0.9

tag:
  size_meters: 0.1

scenario:
  layout: cb
  tag_families: [DICT_6X6_250]
  # ChArUco board: 6x6 grid of squares = 18 markers in white squares
  grid_size: [6, 6]
  square_size: 0.12
  marker_margin: 0.01
  sampling_mode: random
