dataset:
  num_scenes: 1
  # Output path will be overridden by the master experiment config
  output_dir: output/temp_calibration_02

camera:
  resolution: [1280, 720]
  samples_per_scene: 5
  fov: 60
  # Pinhole model, no distortion
  intrinsics:
    focal_length_mm: 50.0
    distortion_k1: 0.0
    distortion_k2: 0.0
    distortion_p1: 0.0
    distortion_p2: 0.0
  # Slow rotation
  velocity_mean: 0.0
  velocity_std: 0.0
  rotation_velocity_mean: 0.05
  rotation_velocity_std: 0.01

tag:
  size_meters: 0.08
  texture_path: assets/tags/tag36h11

scenario:
  layout: aprilgrid
  tag_families: [tag36h11]
  tags_per_scene: [6, 6]
  grid_size: [3, 2]
  # Static scene with dynamic camera
  flying: false

scene:
  lighting:
    # Uniform lighting for calibration
    intensity_min: 500
    intensity_max: 500
    radius_min: 10.0
    radius_max: 10.0
