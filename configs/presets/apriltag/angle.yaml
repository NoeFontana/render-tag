# Angle Sweep Preset (Clean Room)
# Focuses on oblique angle robustness with controlled lighting.

scene:
  texture_dir: null
  background_hdri: null
  lighting_preset: factory # Use factory for three-point style clarity

camera:
  fov: 60.0
  intrinsics:
    k1: 0.0
    k2: 0.0
    k3: 0.0
    p1: 0.0
    p2: 0.0
  sensor_dynamics:
    velocity_mean: 0.0
    velocity_std: 0.0

tag:
  family: tag36h11
  size_meters: 0.16
  material:
    randomize: false
    roughness_min: 0.8
    roughness_max: 0.8
    specular_min: 0.2
    specular_max: 0.2

scenario:
  layout: plain
  tags_per_scene: [1, 1]
  flying: true
