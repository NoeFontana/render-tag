dataset:
  output_dir: output/debug_fast
  num_scenes: 1
  seeds:
    global_seed: 42
camera:
  resolution:
  - 640
  - 480
  samples_per_scene: 1
  fov: 60.0
  iso: 100
  tone_mapping: filmic
  sensor_noise_sigma: 0.0
  ppm_constraint: null
tag:
  family: tag36h11
  size_meters: 0.1
scenario:
  layout: plain
  tag_families:
  - tag36h11
  tags_per_scene:
  - 1
  - 3
scene:
  lighting:
    intensity_min: 200
    intensity_max: 400
  renderer: cycles
physics:
  drop_height: 0.1
version: '0.2'
