name: locus_tone_dr_sweep
description: >
  Characterize detection rate and reprojection error across the sensor
  dynamic-range and tone-mapping axes to locate the knees for each. The
  chosen knee values feed into
  configs/benchmarks/sensor/locus_v1_low_dr_outdoor.yaml and
  configs/benchmarks/sensor/locus_v1_raw_pipeline.yaml as stress setpoints.
  Not wired into CI — run locally, inspect, commit the resulting benchmark.

lock_layout: true
lock_lighting: true
lock_camera: false

sweeps:
  - parameter: camera.dynamic_range_db
    type: categorical
    values: [40.0, 60.0, 80.0, 100.0, 120.0]
  - parameter: camera.tone_mapping
    type: categorical
    values: [linear, srgb, filmic]

base_config:
  presets:
    - locus.v1_baseline
    - subject.tag36h11_standard
  dataset:
    num_scenes: 20
    seeds:
      global_seed: 42
  camera:
    iso: 800
    iso_coupling: true
  version: '0.2'
