name: locus_shadow_azimuth
description: >
  Characterize detection-rate sensitivity to shadow direction. Sweeps the
  SUN azimuth at 8 points around the tag and two elevations (grazing vs
  moderate) while holding sensor realism at Phase 2 knee values (ISO 3200,
  filmic) and locking camera pose. Output tells us whether the detector
  has a directional weakness and where to pin the worst-case azimuth in
  the locus_v1_hard_shadows benchmark. Not wired into CI — run locally,
  inspect, pick knee, commit the benchmark.

  Note: the Experiment pipeline does not run the preset-expand pass, so
  sensor/shadow defaults that would normally come from
  ``sensor.hdr_sweep`` / ``shadow.directional_hard`` are inlined here.

lock_layout: true
lock_lighting: true
lock_camera: false

sweeps:
  - parameter: scene.lighting.directional.0.azimuth
    type: categorical
    # 8 points around the tag, starting at +X and going CCW.
    values: [0.0, 0.785398, 1.570796, 2.356194, 3.141593, 3.926991, 4.712389, 5.497787]
  - parameter: scene.lighting.directional.0.elevation
    type: categorical
    values: [0.2, 0.6]

base_config:
  dataset:
    num_scenes: 15
    seeds:
      global_seed: 42
    evaluation_scopes:
      - detection
      - pose_estimation
  camera:
    resolution: [1920, 1080]
    fov: 70.0
    samples_per_scene: 1
    min_distance: 0.5
    max_distance: 8.0
    min_elevation: 0.5
    max_elevation: 1.0
    min_roll: -180.0
    max_roll: 180.0
    iso: 3200
    iso_coupling: true
    sensor_noise:
      model: gaussian
      mean: 0.0
      stddev: 0.008
    tone_mapping: filmic
    min_tag_pixels: 36
    ppm_constraint:
      min: 5.0
      max: 40.0
      distribution: uniform
  tag:
    margin_bits: 1
    material:
      randomize: true
      roughness_min: 0.4
      roughness_max: 0.8
      specular_min: 0.1
      specular_max: 0.3
  scenario:
    sampling_mode: random
    use_board: false
    subject:
      type: TAGS
      tag_families:
        - tag36h11
      size_mm: 160.0
      tags_per_scene: 1
  scene:
    texture_dir: assets/textures/background
    texture_scale_min: 0.1
    texture_scale_max: 20.0
    lighting:
      # Baseline overridden by both sweep axes on every variant.
      directional:
        - azimuth: 0.0
          elevation: 0.3
          intensity: 5.0
  version: '0.2'
