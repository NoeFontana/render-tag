name: locus_shadow_azimuth
description: >
  Characterize detection-rate sensitivity to shadow direction. Sweeps the
  SUN azimuth at 8 points around the tag and two elevations (grazing vs
  moderate) while holding sensor realism at Phase 2 knee values (ISO 3200,
  filmic) and locking camera pose. Output tells us whether the detector
  has a directional weakness and where to pin the worst-case azimuth in
  the locus_v1_hard_shadows benchmark. Not wired into CI — run locally,
  inspect, pick knee, commit the benchmark.

lock_layout: true
lock_lighting: true
lock_camera: false

sweeps:
  - parameter: scene.lighting.directional.0.azimuth
    type: categorical
    values: [0.0, 0.785398, 1.570796, 2.356194, 3.141593, 3.926991, 4.712389, 5.497787]
  - parameter: scene.lighting.directional.0.elevation
    type: categorical
    values: [0.2, 0.6]

base_config:
  presets:
    - locus.v1_baseline
    - subject.tag36h11_standard
    - sensor.hdr_sweep
  dataset:
    num_scenes: 15
    seeds:
      global_seed: 42
  camera:
    iso: 3200
    tone_mapping: filmic
  scene:
    # Ambient lighting intentionally held at the pre-preset-refactor Pydantic
    # defaults (intensity 50-500, radius 0). A unified ambient level would be
    # a separate decision — see locus.v1_baseline for the benchmark values.
    lighting:
      intensity_min: 50.0
      intensity_max: 500.0
      intensity_sampling: linear
      num_lights_min: 3
      num_lights_max: 3
      radius_min: 0.0
      radius_max: 0.0
      directional:
        - azimuth: 0.0
          elevation: 0.3
          intensity: 5.0
  version: '0.2'
