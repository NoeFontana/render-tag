name: locus_iso_sweep
description: >
  Characterize detection rate and reprojection error vs sensor ISO to locate
  the knee of the curve. The chosen knee value feeds into
  configs/benchmarks/sensor/locus_v1_high_iso.yaml as its stress setpoint.
  Not wired into CI — run locally, inspect, commit the resulting benchmark.

lock_layout: true
lock_lighting: true
lock_camera: false

sweeps:
  - parameter: camera.iso
    type: categorical
    values: [100, 800, 3200, 6400]

base_config:
  presets:
    - locus.v1_baseline
    - subject.tag36h11_standard
  dataset:
    num_scenes: 20
    seeds:
      global_seed: 42
  camera:
    tone_mapping: filmic
    iso_coupling: true
  version: '0.2'
