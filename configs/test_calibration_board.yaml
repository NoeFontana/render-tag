dataset:
  output_dir: output/test_calibration
  num_scenes: 1
  seeds:
    global_seed: 42
camera:
  resolution:
  - 1920
  - 1080
  fov: 70
  samples_per_scene: 1
  min_distance: 1.0
  max_distance: 1.0
  elevation: 0.5
  azimuth: 0.0
scenario:
  layout: board
  tag_families:
  - tag36h11
  board:
    type: aprilgrid
    rows: 4
    cols: 6
    marker_size: 0.08
    spacing_ratio: 0.3
    dictionary: tag36h11
renderer:
  mode: eevee
  max_samples: 32
version: '0.2'
