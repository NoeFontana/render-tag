# Locus Benchmark: PPM-Driven Sweep
# Linearizes difficulty by sampling visual resolution (PPM) uniformly.

dataset:
  num_scenes: 50
  seeds:
    global_seed: 1337
  evaluation_scopes: [detection, pose_estimation]

camera:
  resolution: [1280, 720]
  fov: 69.0
  samples_per_scene: 1
  
  # Target PPM range for AMR docking
  # 5.0 is the detection breaking point
  # 40.0 is the high-confidence comfort zone
  ppm_constraint:
    min: 5.0
    max: 40.0
    distribution: uniform

tag:
  family: tagStandard41h12
  size_meters: 0.16 # Standard physical size for docking tags
  margin_bits: 1
  material:
    randomize: true
    roughness_min: 0.2
    roughness_max: 0.6

scenario:
  layout: plain
  tag_families: [tagStandard41h12]
  tags_per_scene: [1, 1]
  sampling_mode: random
  use_board: false

scene:
  lighting:
    intensity_min: 100
    intensity_max: 800
    radius_min: 0.1
    radius_max: 0.3
  texture_dir: assets/textures/background
