# Outdoor sun benchmark with occluders - real hard shadows across the tag.
# Rod occluders are placed along the SUN ray so their umbra edge slices the
# tag plane in pixel space, stressing gradient-based corner detectors against
# hard-edged shadow boundaries.
# ISO 3200 + filmic inherited from sensor.hdr_sweep (Phase 2 knee).
presets:
  - locus.v1_baseline
  - subject.tag36h11_standard
  - sensor.hdr_sweep
  - lighting.outdoor_sun
  - shadow.occluder_overlay
dataset:
  num_scenes: 50
  seeds:
    global_seed: 42
camera:
  tone_mapping: filmic
  iso: 3200
scene:
  lighting:
    intensity_min: 50
    intensity_max: 5000
    intensity_sampling: log
    num_lights_min: 1
    num_lights_max: 4
version: '0.2'
