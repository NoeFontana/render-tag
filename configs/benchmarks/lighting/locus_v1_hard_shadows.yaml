# Outdoor sun benchmark — directional contrast across the tag plane.
# A dominant SUN with low ambient fill produces strong shading gradients
# and crushed-shadow regions on the tag at low DR. Real cast shadows from
# scene occluders arrive in v2 once OccluderStrategy lands.
# ISO 3200 + filmic inherited from sensor.hdr_sweep (Phase 2 knee).
presets:
  - locus.v1_baseline
  - subject.tag36h11_standard
  - sensor.hdr_sweep
  - lighting.outdoor_sun
dataset:
  num_scenes: 50
  seeds:
    global_seed: 42
camera:
  tone_mapping: filmic
  iso: 3200
version: '0.2'
