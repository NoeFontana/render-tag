# AprilGrid Distortion Benchmark — Brown-Conrady (v1)
# Focus: Distortion calibration under moderate radial+tangential (plumb_bob) distortion.
# Coefficients model a typical wide-angle prime lens (~70° FOV, mild barrel distortion).
# Statistical goal: 150 scenes, full elevation range to stress corner displacement near borders.

presets:
  - calibration.aprilgrid_6x6
  - calibration.reference_grade_rendering
  - lighting.factory

dataset:
  num_scenes: 50
  seeds:
    global_seed: 2027
  evaluation_scopes: [pose_estimation, detection, calibration]
  metadata:
    benchmark: aprilgrid_distortion_brown_conrady_v1
    focus: distortion_calibration_brown_conrady

camera:
  resolution: [1920, 1080]
  fov: 70.0
  samples_per_scene: 1
  min_distance: 1.0
  max_distance: 5.0
  # Full elevation range: stresses corner displacement at image borders
  min_elevation: 0.5
  max_elevation: 1.0
  min_roll: -180.0
  max_roll: 180.0
  # Static sensor (no motion blur)
  sensor_dynamics:
    velocity_mean: 0.0
    velocity_std: 0.0
  ppm_constraint:
    min: 2.0
    max: 20.0
    distribution: uniform
  tone_mapping: filmic
  iso: 100
  intrinsics:
    # Brown-Conrady (OpenCV plumb_bob) — moderate barrel distortion
    distortion_model: brown_conrady
    k1: -0.28
    k2:  0.08
    k3:  0.0
    p1:  0.0002
    p2:  0.0001
  eval_margin_px: 5

scenario:
  subject:
    marker_size_mm: 100.0
  sampling_mode: random

scene:
  texture_dir: assets/textures/background
  texture_scale_min: 1.0
  texture_scale_max: 10.0

version: '0.2'
