presets:
  - calibration.reference_grade_rendering
  - lighting.factory

dataset:
  num_scenes: 150  # Stable statistical baseline
  seeds:
    global_seed: 2026
  evaluation_scopes: [pose_estimation, detection]
  metadata:
    benchmark: charuco_golden_v1
    focus: reference_pose_baseline

camera:
  resolution: [1920, 1080]
  fov: 70.0
  samples_per_scene: 1  # Maximum diversity per image
  min_distance: 1.0
  max_distance: 10.0
  # Golden elevation zone (0 to 41 degrees off-normal)
  min_elevation: 0.75
  max_elevation: 1.0
  # Full rotation invariance
  min_roll: -180.0
  max_roll: 180.0
  # Range adjusted for 1m-10m distance with a 100mm marker:
  # At 10m, PPM is ~2.3; at 1m, PPM is ~22.8.
  ppm_constraint:
    min: 2.0
    max: 20.0
    distribution: uniform
  tone_mapping: filmic
  iso: 100
  eval_margin_px: 5

scenario:
  subject:
    type: BOARD
    rows: 6
    cols: 6
    marker_size_mm: 100.0
    dictionary: DICT_6X6_250
    square_size_mm: 120.0
  sampling_mode: random

scene:
  texture_dir: assets/textures/background
  texture_scale_min: 1.0
  texture_scale_max: 10.0

version: '0.2'
