# Pre-ISP raw-sensor pipeline: shot (Poisson) + read (Gaussian) noise stack,
# linear tone mapping, no ISO coupling. Stresses detection/pose on the
# high-variance input a perception pipeline sees when running on Bayer data
# directly. ISO inherited from sensor.raw_pipeline (1600). Override
# `camera.iso` here after running the characterization sweep if the knee
# shifts.
presets:
  - locus.v1_baseline
  - subject.tag36h11_standard
  - sensor.hdr_sweep
  - sensor.raw_pipeline
dataset:
  num_scenes: 50
  seeds:
    global_seed: 42
version: '0.2'
