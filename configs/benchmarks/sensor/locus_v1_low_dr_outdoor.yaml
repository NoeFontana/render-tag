# Low-DR industrial sensor under outdoor sun illumination.
# Stresses shadow-crush + hot-spot saturation — the dominant failure mode when
# a 60 dB sensor hits a high-contrast outdoor scene with dim ambient and a
# dominant SUN. ISO 400 + Gaussian read noise inherited from sensor.industrial_dr.
presets:
  - locus.v1_baseline
  - subject.tag36h11_standard
  - sensor.industrial_dr
  - lighting.outdoor_sun
dataset:
  num_scenes: 50
  seeds:
    global_seed: 42
version: '0.2'
