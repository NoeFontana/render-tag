# Low-DR industrial sensor under outdoor, harsh-shadow illumination.
# Stresses shadow-crush + hot-spot saturation — the dominant failure mode when
# a 60 dB sensor hits high-contrast outdoor scenes. ISO inherited from
# sensor.industrial_dr (400). Override `camera.iso` here after running
# configs/experiments/locus_tone_dr_sweep.yaml if the knee shifts.
presets:
  - sensor.hdr_sweep
  - sensor.industrial_dr
  - lighting.outdoor_industrial
  - shadow.harsh
dataset:
  num_scenes: 50
  seeds:
    global_seed: 42
  evaluation_scopes:
    - detection
    - pose_estimation
camera:
  resolution: [1920, 1080]
  fov: 70.0
  samples_per_scene: 1
  min_distance: 0.5
  max_distance: 8.0
  min_elevation: 0.5
  max_elevation: 1.0
  min_roll: -180.0
  max_roll: 180.0
  min_tag_pixels: 36
  ppm_constraint:
    min: 5.0
    max: 40.0
    distribution: uniform
tag:
  margin_bits: 1
  material:
    randomize: true
    roughness_min: 0.4
    roughness_max: 0.8
    specular_min: 0.1
    specular_max: 0.3
scenario:
  sampling_mode: random
  use_board: false
  subject:
    type: TAGS
    tag_families:
      - tag36h11
    size_mm: 160.0
    tags_per_scene: 1
scene:
  texture_dir: assets/textures/background
  texture_scale_min: 0.1
  texture_scale_max: 20.0
version: '0.2'
