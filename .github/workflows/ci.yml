name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Ensure that only one instance of this workflow runs per branch at a time.
# Cancels in-progress runs when a new push occurs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    # Run all steps in the context of the uv environment
    env:
      UV_SYSTEM_PYTHON: 1
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          
      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Check Formatting (Ruff)
        run: uv run ruff format --check .

      - name: Lint Code (Ruff)
        run: uv run ruff check .

      - name: Enforce Architecture Layers (Import Linter)
        run: uv run render-tag lint-arch

      - name: Static Type Checking (Ty)
        run: uv run ty check
