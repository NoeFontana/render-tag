name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  build-python:
    name: Build Python Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Build Assets
        run: uv build
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-assets
          path: dist/*

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-python
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            
      - name: Build and Push Docker Image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Generate artifact attestation
        if: github.event.repository.private == false
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python, build-docker]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # We need history for git notes
          
      - name: Download Python Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-assets
          path: dist
          
      - name: Extract Release Notes
        id: extract-notes
        run: |
          # Try to get notes for the current commit (the tag points to this commit)
          NOTES=$(git notes show HEAD 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then
            echo "No git notes found for HEAD. Using default message."
            echo -e "Release automatically generated via GitHub Actions.\n\nPlease refer to the CHANGELOG.md for details." > release_notes.txt
          else
            echo "$NOTES" > release_notes.txt
          fi
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
